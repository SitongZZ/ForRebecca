<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coffee Bot - Blank Street MVP</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.1.0"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; max-width: 1100px; }
    .muted { color: #666; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin: 12px 0; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin: 8px 0; }
    button { padding: 8px 12px; cursor: pointer; }
    input { padding: 6px; }
    table { border-collapse: collapse; width: 100%; margin-top: 10px; }
    th, td { border: 1px solid #ddd; padding: 8px; font-size: 14px; }
    th { background: #f7f7f7; }
    .warn { background: #fff8df; }
  </style>
</head>
<body>
  <h1>Coffee Bot (Blank Street v1.5)</h1>
  <p class="muted">Upload Excel/CSV or fill online. Confirm -> generate checkout-assist page (manual payment only).</p>

  <div class="card">
    <strong>Defaults:</strong> unclear details -> <code>Large + Whole Milk</code><br/>
    <strong>Thresholds:</strong> auto >= <code>0.82</code>, confirm >= <code>0.68</code>
  </div>

  <div class="card">
    <h3>A) Upload Excel/CSV</h3>
    <div class="row">
      <input id="fileInput" type="file" accept=".xlsx,.xls,.csv" />
      <button id="parseFileBtn">Parse File</button>
    </div>
    <p class="muted">Expected columns: <code>name</code>, <code>order_text</code>, <code>qty</code></p>
  </div>

  <div class="card">
    <h3>B) Fill Online</h3>
    <div class="row">
      <input id="nameInput" placeholder="Name" />
      <input id="orderInput" placeholder="Order text" style="min-width:320px;" />
      <input id="qtyInput" type="number" min="1" value="1" style="width:70px;" />
      <button id="addRowBtn">Add</button>
      <button id="clearRowsBtn">Clear</button>
    </div>
    <div id="manualRows"></div>
    <button id="parseManualBtn">Parse Manual Orders</button>
  </div>

  <div class="card">
    <button id="confirmBtn" disabled>Confirm & Generate Order Page</button>
    <div id="status" class="muted"></div>
  </div>

  <div id="summary"></div>
  <div id="review"></div>
  <div id="final"></div>

<script>
const MENU_ITEMS = [
  { canonical: 'Pistachio Latte', aliases: ['pistachio latte','pastichio latte','pestichio latte','pistachio late','pastichio late','pestichio late','pistachio','pista latte'] },
  { canonical: 'Latte', aliases: ['latte','caffe latte'] },
  { canonical: 'Flat White', aliases: ['flat white'] },
  { canonical: 'Americano', aliases: ['americano','long black'] },
  { canonical: 'Cappuccino', aliases: ['cappuccino','cap'] },
  { canonical: 'Matcha Latte', aliases: ['matcha','matcha latte'] },
  { canonical: 'Mocha', aliases: ['mocha'] },
  { canonical: 'Espresso', aliases: ['espresso','single espresso'] },
  { canonical: 'Double Espresso', aliases: ['double espresso','doppio'] },
  { canonical: 'Cortado', aliases: ['cortado'] },
  { canonical: 'Macchiato', aliases: ['macchiato','espresso macchiato'] },
  { canonical: 'Iced Latte', aliases: ['iced latte','ice latte'] },
  { canonical: 'Iced Americano', aliases: ['iced americano','ice americano'] },
  { canonical: 'Iced Matcha Latte', aliases: ['iced matcha','iced matcha latte','ice matcha'] },
  { canonical: 'Cold Brew', aliases: ['cold brew'] },
  { canonical: 'Vanilla Latte', aliases: ['vanilla latte'] },
  { canonical: 'Caramel Latte', aliases: ['caramel latte'] },
  { canonical: 'Hazelnut Latte', aliases: ['hazelnut latte'] },
  { canonical: 'Chai Latte', aliases: ['chai latte','chai'] },
  { canonical: 'Hot Chocolate', aliases: ['hot chocolate','hot choc'] },
  { canonical: 'English Breakfast Tea', aliases: ['english breakfast','english breakfast tea'] },
  { canonical: 'Earl Grey Tea', aliases: ['earl grey','earl grey tea'] },
  { canonical: 'Green Tea', aliases: ['green tea'] },
  { canonical: 'Peppermint Tea', aliases: ['peppermint tea','mint tea'] },
  { canonical: 'Chamomile Tea', aliases: ['chamomile tea','camomile tea'] },
  { canonical: 'Iced Tea', aliases: ['iced tea','ice tea'] },
  { canonical: 'Orange Juice', aliases: ['orange juice','oj'] },
  { canonical: 'Lemonade', aliases: ['lemonade'] },
  { canonical: 'Still Water', aliases: ['still water','water'] },
  { canonical: 'Sparkling Water', aliases: ['sparkling water'] }
];

const AUTO_ACCEPT_THRESHOLD = 0.82;
const NEEDS_CONFIRM_THRESHOLD = 0.68;
const DEFAULT_SIZE = 'Large';
const DEFAULT_MILK = 'Whole Milk';

const MILK_KEYWORDS = new Map([
  ['whole','Whole Milk'], ['oat','Oat Milk'], ['almond','Almond Milk'], ['soy','Soy Milk'], ['soya','Soy Milk'], ['coconut','Coconut Milk']
]);
const SIZE_KEYWORDS = new Map([
  ['small','Small'], ['medium','Medium'], ['regular','Medium'], ['large','Large']
]);

const aliasIndex = MENU_ITEMS.flatMap(i => i.aliases.map(a => ({ alias: a, canonical: i.canonical })));
const drinkFuse = new Fuse(aliasIndex, {
  keys: ['alias'], includeScore: true, threshold: 0.35, ignoreLocation: true, minMatchCharLength: 3
});

let parsed=[]; let manual=[];
const norm=s=>(s||'').trim().toLowerCase().replace(/\s+/g,' ');

function detectDrink(text){
  const matches=[];
  for (const item of MENU_ITEMS) {
    for (const alias of item.aliases) if (text.includes(alias)) matches.push({ canonical: item.canonical, alias });
  }
  if (matches.length) {
    matches.sort((a,b)=>b.alias.length-a.alias.length);
    const top = matches[0];
    const topCanonicals = [...new Set(matches.filter(m=>m.alias.length===top.alias.length).map(m=>m.canonical))];
    if (topCanonicals.length > 1) return { drink: topCanonicals.join('/'), conf: 0.35, ask: true, reason: 'multiple_drink_candidates', method: 'exact-ambiguous' };
    return { drink: top.canonical, conf: 0.95, ask: false, reason: '', method: 'exact' };
  }

  const fuzzy = drinkFuse.search(text).slice(0, 1);
  if (!fuzzy.length) return { drink: 'UNKNOWN', conf: 0.2, ask: true, reason: 'no_drink_detected', method: 'none' };
  const best = fuzzy[0];
  const conf = Number((1 - (best.score ?? 1)).toFixed(2));
  if (conf < NEEDS_CONFIRM_THRESHOLD) return { drink: 'UNKNOWN', conf: 0.2, ask: true, reason: 'no_drink_detected', method: 'none' };
  if (conf < AUTO_ACCEPT_THRESHOLD) return { drink: best.item.canonical, conf, ask: true, reason: 'low_confidence_fuzzy_match', method: 'fuzzy-confirm' };
  return { drink: best.item.canonical, conf, ask: false, reason: '', method: 'fuzzy-auto' };
}

function detectMilk(t){ for (const [k,v] of MILK_KEYWORDS) if (t.includes(k)) return { milk:v, def:false }; return { milk:DEFAULT_MILK, def:true }; }
function detectSize(t){ for (const [k,v] of SIZE_KEYWORDS) if (t.includes(k)) return { size:v, def:false }; return { size:DEFAULT_SIZE, def:true }; }

function parseRow(r){
  const name=(r.name||'').trim(); const raw=(r.order_text||'').trim(); const qty=parseInt(r.qty||'1',10)||1; const t=norm(raw);
  if(!t) return {name,raw_order_text:raw,quantity:qty,drink:'UNKNOWN',size:DEFAULT_SIZE,milk:DEFAULT_MILK,confidence:0,match_method:'none',clarification_needed:true,clarification_reason:'blank_order',defaults_applied:{size:true,milk:true}};

  const d=detectDrink(t), s=detectSize(t), m=detectMilk(t);
  const conf=Math.min(0.99, Number((d.conf + (s.def?0:0.03)+(m.def?0:0.03)).toFixed(2)));
  return {name,raw_order_text:raw,quantity:qty,drink:d.drink,size:s.size,milk:m.milk,confidence:conf,match_method:d.method,clarification_needed:d.ask,clarification_reason:d.reason,defaults_applied:{size:s.def,milk:m.def}};
}

function renderManualRows(){
  if(!manual.length){ document.getElementById('manualRows').innerHTML='<p class="muted">No rows yet.</p>'; return; }
  const rows=manual.map((r,i)=>`<tr><td>${r.name}</td><td>${r.order_text}</td><td>${r.qty}</td><td><button onclick="removeRow(${i})">Delete</button></td></tr>`).join('');
  document.getElementById('manualRows').innerHTML=`<table><thead><tr><th>Name</th><th>Order</th><th>Qty</th><th>Action</th></tr></thead><tbody>${rows}</tbody></table>`;
}
window.removeRow=(i)=>{ manual.splice(i,1); renderManualRows(); };

document.getElementById('addRowBtn').onclick=()=>{
  const name=document.getElementById('nameInput').value.trim();
  const order_text=document.getElementById('orderInput').value.trim();
  const qty=parseInt(document.getElementById('qtyInput').value||'1',10)||1;
  if(!name){ alert('Name required'); return; }
  manual.push({name,order_text,qty});
  document.getElementById('nameInput').value=''; document.getElementById('orderInput').value=''; document.getElementById('qtyInput').value='1';
  renderManualRows();
};
document.getElementById('clearRowsBtn').onclick=()=>{ manual=[]; renderManualRows(); };

function parseCsv(text){
  const lines=text.split(/\r?\n/).filter(Boolean); if(lines.length<2) return [];
  const headers=lines[0].split(',').map(x=>x.trim());
  return lines.slice(1).map(line=>{
    let inQ=false, cur='', cols=[];
    for(const ch of line){ if(ch==='"') inQ=!inQ; else if(ch===','&&!inQ){cols.push(cur); cur='';} else cur+=ch; }
    cols.push(cur); const o={}; headers.forEach((h,i)=>o[h]=(cols[i]||'').trim()); return o;
  });
}

async function readFile(file){
  const ext=file.name.toLowerCase().split('.').pop();
  if(ext==='csv') return parseCsv(await file.text());
  const data=await file.arrayBuffer();
  const wb=XLSX.read(data,{type:'array'}); const sh=wb.Sheets[wb.SheetNames[0]];
  return XLSX.utils.sheet_to_json(sh,{defval:''});
}

function renderParsed(){
  const need=parsed.filter(x=>x.clarification_needed).length;
  const defaults=parsed.filter(x=>x.defaults_applied.size||x.defaults_applied.milk).length;
  const exact=parsed.filter(x=>x.match_method==='exact').length;
  const fAuto=parsed.filter(x=>x.match_method==='fuzzy-auto').length;
  const fConfirm=parsed.filter(x=>x.match_method==='fuzzy-confirm').length;

  document.getElementById('summary').innerHTML=`<div class='card'><b>Summary:</b> ${parsed.length} orders | ${need} clarifications | defaults ${defaults} | exact ${exact} | fuzzy auto ${fAuto} | fuzzy confirm ${fConfirm}</div>`;
  const body=parsed.map(r=>`<tr class='${r.clarification_needed?'warn':''}'><td>${r.name}</td><td>${r.raw_order_text||'-'}</td><td>${r.drink}</td><td>${r.size}</td><td>${r.milk}</td><td>${r.quantity}</td><td>${r.match_method}</td><td>${r.confidence}</td><td>${r.clarification_needed?('YES ('+r.clarification_reason+')'):'No'}</td></tr>`).join('');
  document.getElementById('review').innerHTML=`<table><thead><tr><th>Name</th><th>Raw</th><th>Drink</th><th>Size</th><th>Milk</th><th>Qty</th><th>Method</th><th>Conf</th><th>Clarify</th></tr></thead><tbody>${body}</tbody></table>`;
  document.getElementById('confirmBtn').disabled=parsed.length===0;
}

function aggregateCart(){
  const map=new Map();
  for(const r of parsed){ if(r.drink==='UNKNOWN') continue; const k=`${r.drink}|${r.size}|${r.milk}`; map.set(k,(map.get(k)||0)+r.quantity); }
  return [...map.entries()].map(([k,q])=>{const [drink,size,milk]=k.split('|'); return {drink,size,milk,quantity:q};});
}

function renderFinal(){
  const cart=aggregateCart();
  const list = cart.length ? `<ul>${cart.map(i=>`<li><b>${i.quantity}x</b> ${i.size} ${i.drink} (${i.milk})</li>`).join('')}</ul>` : '<p>No valid items.</p>';
  const unclear=parsed.filter(x=>x.clarification_needed);
  const unclearHtml = unclear.length ? `<ul>${unclear.map(x=>`<li>${x.name}: ${x.clarification_reason}</li>`).join('')}</ul>` : '<p>None</p>';

  const summaryText = cart.map(i => `${i.quantity}x ${i.size} ${i.drink} (${i.milk})`).join('\n');
  const encoded = encodeURIComponent('Blank Street order\n' + summaryText);

  document.getElementById('final').innerHTML = `
    <div class='card'>
      <h3>Checkout Assist (Stop Before Payment)</h3>
      <p><b>Chain:</b> Blank Street</p>
      ${list}
      <h4>Need confirmation before payment</h4>
      ${unclearHtml}
      <div class='row'>
        <button onclick="window.open('https://link.blankstreet.com','_blank')">Open Blank Street App Link</button>
        <button onclick="window.open('https://www.google.com/maps/search/Blank+Street+Coffee+near+me','_blank')">Find Nearest Blank Street</button>
        <button onclick="copySummary()">Copy Order Summary</button>
      </div>
      <p class='muted'>Manual payment required (Amex by Freddie). This page prepares cart instructions only.</p>
      <textarea id='orderSummaryBox' style='width:100%;height:120px;'>${summaryText}</textarea>
    </div>`;
}

window.copySummary = async function(){
  const text = document.getElementById('orderSummaryBox')?.value || '';
  await navigator.clipboard.writeText(text);
  alert('Order summary copied.');
};

document.getElementById('parseFileBtn').onclick=async()=>{
  const f=document.getElementById('fileInput').files[0]; if(!f){alert('Choose file first'); return;}
  document.getElementById('status').textContent='Parsing file...';
  const rows=await readFile(f); parsed=rows.map(parseRow); renderParsed();
  document.getElementById('status').textContent='Parsed from file.';
};

document.getElementById('parseManualBtn').onclick=()=>{
  if(!manual.length){ alert('Add at least one row'); return; }
  document.getElementById('status').textContent='Parsing manual rows...';
  parsed=manual.map(parseRow); renderParsed();
  document.getElementById('status').textContent='Parsed from manual form.';
};

document.getElementById('confirmBtn').onclick=()=>{
  renderFinal();
  document.getElementById('status').textContent='Checkout assist generated. Please verify then pay manually.';
};

renderManualRows();
</script>
</body>
</html>
