<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coffee Bot - Blank Street MVP</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; max-width: 1100px; }
    .muted { color: #666; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin: 12px 0; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin: 8px 0; }
    button { padding: 8px 12px; cursor: pointer; }
    input, select { padding: 6px; }
    table { border-collapse: collapse; width: 100%; margin-top: 10px; }
    th, td { border: 1px solid #ddd; padding: 8px; font-size: 14px; }
    th { background: #f7f7f7; }
    .warn { background: #fff8df; }
  </style>
</head>
<body>
  <h1>Coffee Bot (Blank Street MVP)</h1>
  <p class="muted">Two ways: upload Excel/CSV OR fill orders directly online.</p>

  <div class="card">
    <strong>Default rule:</strong> If unclear, auto-apply <code>Large + Whole Milk</code>
  </div>

  <div class="card">
    <h3>A) Upload Excel/CSV</h3>
    <div class="row">
      <input id="fileInput" type="file" accept=".xlsx,.xls,.csv" />
      <button id="parseFileBtn">Parse File</button>
    </div>
    <p class="muted">Expected columns: <code>name</code>, <code>order_text</code>, <code>qty</code></p>
  </div>

  <div class="card">
    <h3>B) Fill Online (No Excel needed)</h3>
    <div class="row">
      <input id="nameInput" placeholder="Name" />
      <input id="orderInput" placeholder="Order text (e.g. iced latte oat)" style="min-width: 320px;" />
      <input id="qtyInput" type="number" min="1" value="1" style="width: 80px;" />
      <button id="addRowBtn">Add</button>
      <button id="clearRowsBtn">Clear</button>
    </div>
    <div id="manualRows"></div>
    <div class="row">
      <button id="parseManualBtn">Parse Manual Orders</button>
    </div>
  </div>

  <div class="card">
    <button id="confirmBtn" disabled>Confirm & Generate Order Page</button>
    <div id="status" class="muted" style="margin-top:8px;"></div>
  </div>

  <div id="summary"></div>
  <div id="review"></div>
  <div id="final"></div>

<script>
const MENU_ITEMS = [
  { canonical: 'Pistachio Latte', aliases: ['pistachio latte', 'pastichio latte', 'pistachio', 'pista latte'] },
  { canonical: 'Latte', aliases: ['latte', 'caffe latte'] },
  { canonical: 'Flat White', aliases: ['flat white'] },
  { canonical: 'Americano', aliases: ['americano'] },
  { canonical: 'Cappuccino', aliases: ['cappuccino', 'cap'] },
  { canonical: 'Matcha Latte', aliases: ['matcha', 'matcha latte'] },
  { canonical: 'Mocha', aliases: ['mocha'] },
  { canonical: 'Espresso', aliases: ['espresso'] }
];
const MILK_KEYWORDS = new Map([
  ['whole','Whole Milk'], ['oat','Oat Milk'], ['almond','Almond Milk'], ['soy','Soy Milk'], ['soya','Soy Milk']
]);
const SIZE_KEYWORDS = new Map([
  ['small','Small'], ['medium','Medium'], ['regular','Medium'], ['large','Large']
]);
const DEFAULT_SIZE='Large'; const DEFAULT_MILK='Whole Milk';
let parsed=[]; let manual=[];

const norm=s=>(s||'').trim().toLowerCase().replace(/\s+/g,' ');
function detectDrink(t){
  const matches=[];
  for (const item of MENU_ITEMS) {
    for (const alias of item.aliases) {
      if (t.includes(alias)) matches.push({ canonical: item.canonical, alias });
    }
  }

  if(!matches.length) return {drink:'UNKNOWN',conf:0.2,ask:true,reason:'no_drink_detected'};

  matches.sort((a,b)=>b.alias.length-a.alias.length);
  const top=matches[0];
  const topCanonicals=[...new Set(matches.filter(m=>m.alias.length===top.alias.length).map(m=>m.canonical))];

  if(topCanonicals.length>1){
    return {drink:topCanonicals.join('/'),conf:0.35,ask:true,reason:'multiple_drink_candidates'};
  }
  return {drink:top.canonical,conf:0.92,ask:false,reason:''};
}
function detectMilk(t){ for(const [k,v] of MILK_KEYWORDS) if(t.includes(k)) return {milk:v,def:false}; return {milk:DEFAULT_MILK,def:true}; }
function detectSize(t){ for(const [k,v] of SIZE_KEYWORDS) if(t.includes(k)) return {size:v,def:false}; return {size:DEFAULT_SIZE,def:true}; }
function parseRow(r){
  const name=(r.name||'').trim(); const raw=(r.order_text||'').trim(); const qty=parseInt(r.qty||'1',10)||1; const t=norm(raw);
  if(!t) return {name,raw_order_text:raw,quantity:qty,drink:'UNKNOWN',size:DEFAULT_SIZE,milk:DEFAULT_MILK,confidence:0,clarification_needed:true,clarification_reason:'blank_order',defaults_applied:{size:true,milk:true}};
  const d=detectDrink(t), s=detectSize(t), m=detectMilk(t);
  const conf=Math.min(0.99, Number((d.conf + (s.def?0:0.07)+(m.def?0:0.07)).toFixed(2)));
  return {name,raw_order_text:raw,quantity:qty,drink:d.drink,size:s.size,milk:m.milk,confidence:conf,clarification_needed:d.ask,clarification_reason:d.reason,defaults_applied:{size:s.def,milk:m.def}};
}

function renderManualRows(){
  if(!manual.length){ document.getElementById('manualRows').innerHTML='<p class="muted">No rows yet.</p>'; return; }
  const rows=manual.map((r,i)=>`<tr><td>${r.name}</td><td>${r.order_text}</td><td>${r.qty}</td><td><button onclick="removeRow(${i})">Delete</button></td></tr>`).join('');
  document.getElementById('manualRows').innerHTML=`<table><thead><tr><th>Name</th><th>Order</th><th>Qty</th><th>Action</th></tr></thead><tbody>${rows}</tbody></table>`;
}
window.removeRow=(i)=>{ manual.splice(i,1); renderManualRows(); };

document.getElementById('addRowBtn').onclick=()=>{
  const name=document.getElementById('nameInput').value.trim();
  const order_text=document.getElementById('orderInput').value.trim();
  const qty=parseInt(document.getElementById('qtyInput').value||'1',10)||1;
  if(!name){ alert('Name required'); return; }
  manual.push({name,order_text,qty});
  document.getElementById('nameInput').value=''; document.getElementById('orderInput').value=''; document.getElementById('qtyInput').value='1';
  renderManualRows();
};
document.getElementById('clearRowsBtn').onclick=()=>{ manual=[]; renderManualRows(); };

function parseCsv(text){
  const lines=text.split(/\r?\n/).filter(Boolean); if(lines.length<2) return [];
  const headers=lines[0].split(',').map(x=>x.trim());
  return lines.slice(1).map(line=>{
    let inQ=false, cur='', cols=[];
    for(const ch of line){ if(ch==='"') inQ=!inQ; else if(ch===','&&!inQ){cols.push(cur); cur='';} else cur+=ch; }
    cols.push(cur); const o={}; headers.forEach((h,i)=>o[h]=(cols[i]||'').trim()); return o;
  });
}

async function readFile(file){
  const ext=file.name.toLowerCase().split('.').pop();
  if(ext==='csv') return parseCsv(await file.text());
  const data=await file.arrayBuffer();
  const wb=XLSX.read(data,{type:'array'}); const sh=wb.Sheets[wb.SheetNames[0]];
  return XLSX.utils.sheet_to_json(sh,{defval:''});
}

function renderParsed(){
  const need=parsed.filter(x=>x.clarification_needed).length;
  const defaults=parsed.filter(x=>x.defaults_applied.size||x.defaults_applied.milk).length;
  document.getElementById('summary').innerHTML=`<div class='card'><b>Summary:</b> ${parsed.length} orders | ${need} clarifications | ${defaults} used defaults</div>`;
  const body=parsed.map(r=>`<tr class='${r.clarification_needed?'warn':''}'><td>${r.name}</td><td>${r.raw_order_text||'-'}</td><td>${r.drink}</td><td>${r.size}</td><td>${r.milk}</td><td>${r.quantity}</td><td>${r.confidence}</td><td>${r.clarification_needed?('YES ('+r.clarification_reason+')'):'No'}</td></tr>`).join('');
  document.getElementById('review').innerHTML=`<table><thead><tr><th>Name</th><th>Raw</th><th>Drink</th><th>Size</th><th>Milk</th><th>Qty</th><th>Conf</th><th>Clarify</th></tr></thead><tbody>${body}</tbody></table>`;
  document.getElementById('confirmBtn').disabled=parsed.length===0;
}

function renderFinal(){
  const map=new Map();
  for(const r of parsed){ if(r.drink==='UNKNOWN') continue; const k=`${r.drink}|${r.size}|${r.milk}`; map.set(k,(map.get(k)||0)+r.quantity); }
  const items=[...map.entries()].map(([k,q])=>{const [d,s,m]=k.split('|'); return {d,s,m,q};});
  const list=items.length?`<ul>${items.map(i=>`<li><b>${i.q}x</b> ${i.s} ${i.d} (${i.m})</li>`).join('')}</ul>`:'<p>No valid items.</p>';
  const unclear=parsed.filter(x=>x.clarification_needed);
  const u=unclear.length?`<ul>${unclear.map(x=>`<li>${x.name}: ${x.clarification_reason}</li>`).join('')}</ul>`:'<p>None</p>';
  document.getElementById('final').innerHTML=`<div class='card'><h3>Order Draft (Manual Pay)</h3><p><b>Chain:</b> Blank Street</p><h4>Cart</h4>${list}<h4>Need check before payment</h4>${u}</div>`;
}

document.getElementById('parseFileBtn').onclick=async()=>{
  const f=document.getElementById('fileInput').files[0]; if(!f){alert('Choose file first'); return;}
  document.getElementById('status').textContent='Parsing file...';
  const rows=await readFile(f); parsed=rows.map(parseRow); renderParsed();
  document.getElementById('status').textContent='Parsed from file.';
};

document.getElementById('parseManualBtn').onclick=()=>{
  if(!manual.length){ alert('Add at least one row'); return; }
  document.getElementById('status').textContent='Parsing manual rows...';
  parsed=manual.map(parseRow); renderParsed();
  document.getElementById('status').textContent='Parsed from manual form.';
};

document.getElementById('confirmBtn').onclick=()=>{ renderFinal(); document.getElementById('status').textContent='Final order page generated.'; };
renderManualRows();
</script>
</body>
</html>
